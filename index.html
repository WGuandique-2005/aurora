<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --lavender: #c9b8e8;
    --sky: #a8c8e8;
    --rose: #e8b8c9;
    --peach: #f0c9a8;
    --mint: #b8e8d8;

    --bg: #0a0a10;
    --bg-elev: #12121b;
    --card: rgba(255,255,255,0.035);
    --card-border: rgba(255,255,255,0.08);
    --text: #f1eef9;
    --text-dim: #a7a3b8;
    --text-faint: #6f6b82;
    --shadow: rgba(0,0,0,0.35);
    --halo-op: 0.55;
  }

  html[data-theme="light"]{
    --bg: #f6f3fb;
    --bg-elev: #ffffff;
    --card: rgba(255,255,255,0.75);
    --card-border: rgba(70,50,110,0.08);
    --text: #2c2740;
    --text-dim: #6b6482;
    --text-faint: #9a93b0;
    --shadow: rgba(120,100,160,0.18);
    --halo-op: 0.75;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  body{
    font-family:'Plus Jakarta Sans', sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
    transition: background 0.5s ease, color 0.5s ease;
    position:relative;
  }

  /* ---------- fondo con difuminados radiales ---------- */
  .bg-glow{
    position:fixed; inset:0; z-index:-1; overflow:hidden;
  }
  .bg-glow span{
    position:absolute; border-radius:50%; filter:blur(90px);
    opacity: var(--halo-op);
    transition: opacity 0.5s ease;
  }
  .bg-glow span:nth-child(1){
    width:42vw; height:42vw; background:var(--lavender);
    top:-10%; left:-8%; opacity:0.28;
    animation: float1 22s ease-in-out infinite;
  }
  .bg-glow span:nth-child(2){
    width:38vw; height:38vw; background:var(--sky);
    top:10%; right:-10%; opacity:0.22;
    animation: float2 26s ease-in-out infinite;
  }
  .bg-glow span:nth-child(3){
    width:34vw; height:34vw; background:var(--rose);
    bottom:-12%; left:12%; opacity:0.18;
    animation: float3 24s ease-in-out infinite;
  }
  .bg-glow span:nth-child(4){
    width:30vw; height:30vw; background:var(--peach);
    bottom:-6%; right:8%; opacity:0.16;
    animation: float1 30s ease-in-out infinite reverse;
  }
  html[data-theme="light"] .bg-glow span{ opacity:0.55 !important; filter:blur(110px); }

  @keyframes float1{ 0%,100%{transform:translate(0,0);} 50%{transform:translate(3vw,4vh);} }
  @keyframes float2{ 0%,100%{transform:translate(0,0);} 50%{transform:translate(-4vw,3vh);} }
  @keyframes float3{ 0%,100%{transform:translate(0,0);} 50%{transform:translate(2vw,-4vh);} }

  /* ---------- layout ---------- */
  .app{
    max-width: 920px;
    margin: 0 auto;
    padding: 24px 20px 80px;
    position:relative;
    z-index:1;
  }

  .topbar{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom: 36px;
  }

  .search-wrap{
    position:relative;
    flex:1;
  }

  .search-input{
    width:100%;
    background: var(--card);
    border:1px solid var(--card-border);
    backdrop-filter: blur(16px);
    border-radius: 999px;
    padding: 13px 20px;
    font-family:'Plus Jakarta Sans', sans-serif;
    font-size: 14.5px;
    font-weight:400;
    color: var(--text);
    outline:none;
    transition: border-color 0.25s ease, background 0.25s ease;
  }
  .search-input::placeholder{ color: var(--text-faint); }
  .search-input:focus{ border-color: rgba(201,184,232,0.5); }

  .dropdown{
    position:absolute;
    top: calc(100% + 8px);
    left:0; right:0;
    background: var(--bg-elev);
    border:1px solid var(--card-border);
    border-radius: 18px;
    overflow:hidden;
    box-shadow: 0 20px 40px var(--shadow);
    z-index:50;
    display:none;
  }
  .dropdown.show{ display:block; animation: fadeSlide 0.2s ease; }
  .dropdown-item{
    padding: 12px 18px;
    font-size:13.5px;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    gap:2px;
    border-bottom:1px solid var(--card-border);
    transition: background 0.15s ease;
  }
  .dropdown-item:last-child{ border-bottom:none; }
  .dropdown-item:hover{ background: rgba(201,184,232,0.1); }
  .dropdown-item b{ font-weight:500; color:var(--text); }
  .dropdown-item small{ color:var(--text-dim); font-size:11.5px; }

  .icon-btn{
    width:44px; height:44px;
    min-width:44px;
    border-radius:50%;
    background: var(--card);
    border:1px solid var(--card-border);
    backdrop-filter: blur(16px);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    color: var(--text);
    transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
  }
  .icon-btn:hover{ transform: translateY(-2px); border-color: rgba(201,184,232,0.4); }
  .icon-btn:active{ transform: translateY(0px) scale(0.96); }
  .icon-btn.loading svg{ animation: spin 1s linear infinite; }
  .icon-btn svg{ width:19px; height:19px; }

  /* ---------- hero ---------- */
  .hero{
    text-align:center;
    padding: 20px 0 30px;
    opacity:0;
    animation: fadeUp 0.7s ease forwards;
  }

  .hero .place{
    font-size: 15px;
    font-weight:500;
    letter-spacing:0.3px;
    color: var(--text-dim);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
  }
  .hero .date{
    font-size: 13px;
    color: var(--text-faint);
    margin-top:4px;
    font-weight:400;
  }

  .hero-icon-wrap{
    position:relative;
    width: 170px; height:170px;
    margin: 18px auto 0;
    display:flex; align-items:center; justify-content:center;
  }
  .halo{
    position:absolute;
    width:100%; height:100%;
    border-radius:50%;
    filter: blur(38px);
    opacity:0.55;
    z-index:0;
  }
  .hero-icon-wrap svg{ position:relative; z-index:1; width:128px; height:128px; }

  .temp{
    font-family:'Outfit', sans-serif;
    font-weight:200;
    font-size: 130px;
    line-height:1;
    letter-spacing:-4px;
    margin-top: 4px;
    background: linear-gradient(180deg, var(--text) 0%, var(--text-dim) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  .temp sup{ font-size:0.4em; font-weight:300; letter-spacing:0; }

  .condition{
    font-family:'Outfit', sans-serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--text);
    margin-top:2px;
  }
  .feels-like{
    font-size:13.5px;
    color: var(--text-dim);
    margin-top:6px;
  }
  .minmax{
    display:flex; justify-content:center; gap:18px;
    margin-top:14px;
    font-size: 13.5px;
    color: var(--text-dim);
  }
  .minmax span b{ color:var(--text); font-weight:500; }

  /* ---------- secciones ---------- */
  .section{
    margin-top: 34px;
    opacity:0;
    animation: fadeUp 0.7s ease forwards;
  }
  .section-title{
    font-family:'Outfit', sans-serif;
    font-size: 13px;
    font-weight:500;
    letter-spacing: 1.2px;
    text-transform:uppercase;
    color: var(--text-faint);
    margin-bottom: 14px;
    padding-left:4px;
  }

  /* grid de detalles */
  .details-grid{
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
  }
  .detail-card{
    background: var(--card);
    border:1px solid var(--card-border);
    backdrop-filter: blur(16px);
    border-radius: 20px;
    padding: 16px 14px;
    text-align:center;
  }
  .detail-card svg{ width:22px; height:22px; opacity:0.75; margin-bottom:8px; }
  .detail-card .val{
    font-family:'Outfit', sans-serif;
    font-size: 21px;
    font-weight:400;
    color: var(--text);
  }
  .detail-card .lbl{
    font-size: 11px;
    color: var(--text-faint);
    margin-top:3px;
    letter-spacing:0.3px;
  }

  /* hourly scroll */
  .hourly-scroll{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding: 4px 4px 12px;
    scroll-snap-type: x proximity;
  }
  .hourly-scroll::-webkit-scrollbar{ height:5px; }
  .hourly-scroll::-webkit-scrollbar-thumb{ background: var(--card-border); border-radius:10px; }

  .hour-card{
    min-width: 76px;
    background: var(--card);
    border:1px solid var(--card-border);
    backdrop-filter: blur(16px);
    border-radius: 18px;
    padding: 14px 8px;
    text-align:center;
    flex-shrink:0;
    scroll-snap-align:start;
  }
  .hour-card .hr{ font-size:12px; color:var(--text-dim); font-weight:500; }
  .hour-card svg{ width:28px; height:28px; margin:10px 0; }
  .hour-card .ht{ font-family:'Outfit',sans-serif; font-size:17px; font-weight:400; }
  .hour-card .hp{
    font-size:10.5px; color: var(--sky); margin-top:5px; font-weight:500;
  }

  /* 7 días */
  .days-list{ display:flex; flex-direction:column; gap:4px; }
  .day-row{
    display:grid;
    grid-template-columns: 90px 32px 1fr 80px;
    align-items:center;
    gap: 14px;
    padding: 12px 10px;
    border-radius:16px;
    transition: background 0.2s ease;
  }
  .day-row:hover{ background: rgba(255,255,255,0.02); }
  .day-row .dname{ font-size:13.5px; font-weight:500; color:var(--text); }
  .day-row .dname small{ display:block; font-size:10.5px; color:var(--text-faint); font-weight:400; margin-top:1px; }
  .day-row svg{ width:24px; height:24px; }

  .range-bar{
    position:relative;
    height:5px;
    border-radius:4px;
    background: rgba(255,255,255,0.06);
  }
  .range-fill{
    position:absolute;
    height:100%;
    border-radius:4px;
    background: linear-gradient(90deg, var(--sky), var(--rose));
  }
  .day-temps{
    display:flex; justify-content:flex-end; gap:8px;
    font-size:13px;
    font-family:'Outfit', sans-serif;
  }
  .day-temps .lo{ color: var(--text-faint); }
  .day-temps .hi{ color: var(--text); font-weight:500; }

  /* footer / status */
  .status-msg{
    text-align:center;
    color: var(--text-faint);
    font-size:12.5px;
    margin-top: 40px;
    padding-top:20px;
    border-top:1px solid var(--card-border);
  }

  .loader{
    display:flex; justify-content:center; align-items:center;
    padding: 100px 0;
    color: var(--text-dim);
    font-size: 14px;
    gap:10px;
  }
  .loader svg{ width:18px; height:18px; animation: spin 1s linear infinite; }

  .toast{
    position:fixed;
    bottom: 24px; left:50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-elev);
    border:1px solid var(--card-border);
    color: var(--text);
    padding: 12px 22px;
    border-radius: 999px;
    font-size: 13px;
    box-shadow: 0 10px 30px var(--shadow);
    opacity:0;
    pointer-events:none;
    transition: opacity 0.3s ease, transform 0.3s ease;
    z-index:100;
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(0); pointer-events:auto; }

  /* ---------- animaciones svg ---------- */
  @keyframes spin{ to{ transform: rotate(360deg); } }
  @keyframes drift{ 0%,100%{ transform: translateX(0); } 50%{ transform: translateX(6px); } }
  @keyframes bob{ 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-5px); } }
  @keyframes rainfall{ 0%{ transform: translateY(-3px); opacity:0; } 40%{opacity:1;} 100%{ transform: translateY(9px); opacity:0; } }
  @keyframes snowfall{ 0%{ transform: translateY(-3px) rotate(0deg); opacity:0.9;} 100%{ transform: translateY(10px) rotate(120deg); opacity:0.2; } }
  @keyframes flash{ 0%,90%,100%{ opacity:1; } 92%,96%{ opacity:0.3; } }
  @keyframes fadeUp{ from{ opacity:0; transform: translateY(14px); } to{ opacity:1; transform: translateY(0); } }
  @keyframes fadeSlide{ from{ opacity:0; transform: translateY(-6px); } to{ opacity:1; transform: translateY(0); } }

  .sun-core{ transform-origin: center; }
  .sun-rays{ transform-origin: center; animation: spin 14s linear infinite; }
  .cloud-back{ animation: drift 6s ease-in-out infinite; }
  .cloud-front{ animation: drift 5s ease-in-out infinite reverse; }
  .drop{ animation: rainfall 1.1s linear infinite; }
  .drop:nth-child(2){ animation-delay:0.3s; }
  .drop:nth-child(3){ animation-delay:0.6s; }
  .flake{ animation: snowfall 2.4s linear infinite; }
  .flake:nth-child(2){ animation-delay:0.7s; }
  .flake:nth-child(3){ animation-delay:1.4s; }
  .bolt{ animation: flash 3s ease-in-out infinite; }
  .fog-line{ animation: drift 4s ease-in-out infinite; }

  /* ---------- responsive ---------- */
  @media (max-width:640px){
    .details-grid{ grid-template-columns: repeat(3, 1fr); }
    .temp{ font-size: 92px; }
    .hero-icon-wrap{ width:130px; height:130px; }
    .hero-icon-wrap svg{ width:96px; height:96px; }
    .day-row{ grid-template-columns: 76px 26px 1fr 66px; gap:10px; padding:10px 6px; }
    .app{ padding: 18px 14px 70px; }
  }
  @media (max-width:400px){
    .details-grid{ grid-template-columns: repeat(2, 1fr); }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.001ms !important; animation-iteration-count:1 !important; }
  }
</style>
</head>
<body>

<div class="bg-glow">
  <span></span><span></span><span></span><span></span>
</div>

<div class="app">

  <div class="topbar">
    <div class="search-wrap">
      <input type="text" class="search-input" id="searchInput" placeholder="Buscar ciudad..." autocomplete="off">
      <div class="dropdown" id="dropdown"></div>
    </div>
    <button class="icon-btn" id="gpsBtn" title="Usar mi ubicación exacta" aria-label="Usar mi ubicación">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M12 2v3M12 19v3M2 12h3M19 12h3"></path>
      </svg>
    </button>
    <button class="icon-btn" id="themeBtn" title="Cambiar tema" aria-label="Cambiar tema">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path>
      </svg>
    </button>
  </div>

  <div id="content">
    <div class="loader">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9" stroke-dasharray="42" stroke-linecap="round"/></svg>
      Detectando tu ubicación...
    </div>
  </div>

  <div class="status-msg" id="statusMsg"></div>

</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  /* ============ ESTADO ============ */
  const state = {
    lat: null, lon: null,
    placeName: "", placeCountry: "",
    unit: "celsius",
    theme: "dark"
  };

  const $ = (sel) => document.querySelector(sel);
  const content = $("#content");
  const statusMsg = $("#statusMsg");
  const toastEl = $("#toast");

  function showToast(msg, ms=3200){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastEl._t);
    toastEl._t = setTimeout(()=> toastEl.classList.remove("show"), ms);
  }

  /* ============ TEMA ============ */
  function applyTheme(t){
    document.documentElement.setAttribute("data-theme", t);
    state.theme = t;
    const icon = $("#themeIcon");
    if(t === "light"){
      icon.innerHTML = '<circle cx="12" cy="12" r="4.5"></circle><path d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"></path>';
    } else {
      icon.innerHTML = '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path>';
    }
    try{ localStorage.setItem("aire-theme", t); }catch(e){}
  }
  (function initTheme(){
    let saved = null;
    try{ saved = localStorage.getItem("aire-theme"); }catch(e){}
    if(!saved){
      saved = (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark";
    }
    applyTheme(saved);
  })();
  $("#themeBtn").addEventListener("click", ()=>{
    applyTheme(state.theme === "dark" ? "light" : "dark");
  });

  /* ============ ICONOS SVG (por código WMO) ============ */
  function iconSun(size=128){
    return `<svg viewBox="0 0 100 100" width="${size}" height="${size}">
      <g class="sun-rays" stroke="#f0c9a8" stroke-width="4" stroke-linecap="round">
        <line x1="50" y1="6" x2="50" y2="16"/>
        <line x1="50" y1="84" x2="50" y2="94"/>
        <line x1="6" y1="50" x2="16" y2="50"/>
        <line x1="84" y1="50" x2="94" y2="50"/>
        <line x1="16.9" y1="16.9" x2="24" y2="24"/>
        <line x1="76" y1="76" x2="83.1" y2="83.1"/>
        <line x1="16.9" y1="83.1" x2="24" y2="76"/>
        <line x1="76" y1="24" x2="83.1" y2="16.9"/>
      </g>
      <circle class="sun-core" cx="50" cy="50" r="22" fill="#f0c9a8"/>
    </svg>`;
  }
  function iconPartlyCloudy(size=128){
    return `<svg viewBox="0 0 100 100" width="${size}" height="${size}">
      <g class="sun-rays" stroke="#f0c9a8" stroke-width="4" stroke-linecap="round" opacity="0.85">
        <line x1="34" y1="10" x2="34" y2="18"/>
        <line x1="10" y1="34" x2="18" y2="34"/>
        <line x1="14.5" y1="14.5" x2="20" y2="20"/>
      </g>
      <circle class="sun-core" cx="34" cy="34" r="16" fill="#f0c9a8"/>
      <g class="cloud-front">
        <ellipse cx="55" cy="66" rx="26" ry="16" fill="#c9b8e8"/>
        <ellipse cx="38" cy="70" rx="18" ry="12" fill="#c9b8e8"/>
      </g>
    </svg>`;
  }
  function iconCloudy(size=128){
    return `<svg viewBox="0 0 100 100" width="${size}" height="${size}">
      <g class="cloud-back" opacity="0.6">
        <ellipse cx="42" cy="42" rx="20" ry="13" fill="#a8c8e8"/>
      </g>
      <g class="cloud-front">
        <ellipse cx="55" cy="62" rx="28" ry="17" fill="#c9b8e8"/>
        <ellipse cx="36" cy="66" rx="19" ry="13" fill="#c9b8e8"/>
      </g>
    </svg>`;
  }
  function iconFog(size=128){
    return `<svg viewBox="0 0 100 100" width="${size}" height="${size}">
      <ellipse cx="50" cy="42" rx="26" ry="15" fill="#a8c8e8" opacity="0.7"/>
      <g stroke="#a8c8e8" stroke-width="4" stroke-linecap="round" opacity="0.8">
        <line class="fog-line" x1="20" y1="64" x2="80" y2="64"/>
        <line class="fog-line" x1="26" y1="74" x2="74" y2="74" style="animation-delay:0.6s"/>
        <line class="fog-line" x1="30" y1="84" x2="70" y2="84" style="animation-delay:1.2s"/>
      </g>
    </svg>`;
  }
  function iconRain(size=128){
    return `<svg viewBox="0 0 100 100" width="${size}" height="${size}">
      <g class="cloud-front">
        <ellipse cx="52" cy="46" rx="27" ry="16" fill="#a8c8e8"/>
        <ellipse cx="34" cy="50" rx="18" ry="12" fill="#a8c8e8"/>
      </g>
      <g class="drop" stroke="#a8c8e8" stroke-width="4" stroke-linecap="round">
        <line x1="38" y1="70" x2="35" y2="80"/>
      </g>
      <g class="drop" stroke="#a8c8e8" stroke-width="4" stroke-linecap="round">
        <line x1="54" y1="70" x2="51" y2="80"/>
      </g>
      <g class="drop" stroke="#a8c8e8" stroke-width="4" stroke-linecap="round">
        <line x1="66" y1="70" x2="63" y2="80"/>
      </g>
    </svg>`;
  }
  function iconStorm(size=128){
    return `<svg viewBox="0 0 100 100" width="${size}" height="${size}">
      <g class="cloud-front">
        <ellipse cx="52" cy="42" rx="27" ry="16" fill="#8f8aa8"/>
        <ellipse cx="34" cy="46" rx="18" ry="12" fill="#8f8aa8"/>
      </g>
      <polygon class="bolt" points="52,58 42,78 50,78 46,94 64,68 54,68" fill="#f0c9a8"/>
    </svg>`;
  }
  function iconSnow(size=128){
    return `<svg viewBox="0 0 100 100" width="${size}" height="${size}">
      <g class="cloud-front">
        <ellipse cx="52" cy="42" rx="27" ry="16" fill="#c9d8f0"/>
        <ellipse cx="34" cy="46" rx="18" ry="12" fill="#c9d8f0"/>
      </g>
      <g fill="#e8f0fb">
        <circle class="flake" cx="38" cy="70" r="3.4"/>
        <circle class="flake" cx="54" cy="72" r="3.4"/>
        <circle class="flake" cx="66" cy="68" r="3.4"/>
      </g>
    </svg>`;
  }
  function iconMoon(size=128){
    return `<svg viewBox="0 0 100 100" width="${size}" height="${size}">
      <path d="M62 20 A32 32 0 1 0 62 80 A26 26 0 1 1 62 20 Z" fill="#c9b8e8"/>
    </svg>`;
  }

  function getWeatherVisual(code, isDay){
    if(code === 0) return isDay ? {icon: iconSun, color:"#f0c9a8", label:"Cielo despejado"} : {icon: iconMoon, color:"#c9b8e8", label:"Cielo despejado"};
    if(code === 1 || code === 2) return {icon: isDay ? iconPartlyCloudy : iconCloudy, color:"#c9b8e8", label: code===1 ? "Mayormente despejado" : "Parcialmente nublado"};
    if(code === 3) return {icon: iconCloudy, color:"#a8c8e8", label:"Nublado"};
    if(code === 45 || code === 48) return {icon: iconFog, color:"#a8c8e8", label:"Niebla"};
    if([51,53,55,56,57].includes(code)) return {icon: iconRain, color:"#a8c8e8", label:"Llovizna"};
    if([61,63,65,66,67,80,81,82].includes(code)) return {icon: iconRain, color:"#a8c8e8", label:"Lluvia"};
    if([71,73,75,77,85,86].includes(code)) return {icon: iconSnow, color:"#c9d8f0", label:"Nieve"};
    if([95,96,99].includes(code)) return {icon: iconStorm, color:"#f0c9a8", label:"Tormenta"};
    return {icon: iconCloudy, color:"#c9b8e8", label:"Nublado"};
  }

  /* ============ ICONOS UI (detalles) ============ */
  const uiIcons = {
    humidity: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2s7 8 7 13a7 7 0 11-14 0c0-5 7-13 7-13z"/></svg>',
    wind: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9h11a3 3 0 100-6"/><path d="M2 15h15a3 3 0 110 6"/></svg>',
    pressure: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>',
    cloud: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 18a4 4 0 000-8 5 5 0 00-9.6-1.5A4.5 4.5 0 007 18h10z"/></svg>',
    uv: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.4 1.4M17.6 17.6L19 19M5 19l1.4-1.4M17.6 6.4L19 5"/></svg>',
    pin: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-7.2-7-12a7 7 0 1114 0c0 4.8-7 12-7 12z"/><circle cx="12" cy="9" r="2.4"/></svg>'
  };

  /* ============ UTILIDADES ============ */
  function debounce(fn, ms){
    let t;
    return (...args)=>{ clearTimeout(t); t = setTimeout(()=>fn(...args), ms); };
  }
  function fmtTemp(v){ return Math.round(v); }
  function windDirLabel(deg){
    const dirs = ["N","NE","E","SE","S","SO","O","NO"];
    return dirs[Math.round(deg / 45) % 8];
  }
  function dayLabel(dateStr, idx){
    const d = new Date(dateStr + "T00:00:00");
    if(idx === 0) return "Hoy";
    const days = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
    return days[d.getDay()];
  }
  function shortDate(dateStr){
    const d = new Date(dateStr + "T00:00:00");
    const months = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
    return `${d.getDate()} ${months[d.getMonth()]}`;
  }
  function hourLabel(iso){
    const d = new Date(iso);
    let h = d.getHours();
    return (h < 10 ? "0"+h : h) + ":00";
  }

  /* ============ RENDER ============ */
  function render(weatherData){
    const cur = weatherData.current;
    const daily = weatherData.daily;
    const hourly = weatherData.hourly;

    const visual = getWeatherVisual(cur.weather_code, cur.is_day);
    const nowIso = new Date().toISOString().slice(0,13);

    // recorte de horas: desde la hora actual, 24 horas
    let startIdx = hourly.time.findIndex(t => t.slice(0,13) >= nowIso);
    if(startIdx < 0) startIdx = 0;
    const hourSlice = { time: hourly.time.slice(startIdx, startIdx+24),
                         temp: hourly.temperature_2m.slice(startIdx, startIdx+24),
                         code: hourly.weather_code.slice(startIdx, startIdx+24),
                         precip: hourly.precipitation_probability.slice(startIdx, startIdx+24),
                         isDay: hourly.is_day.slice(startIdx, startIdx+24) };

    const globalMin = Math.min(...daily.temperature_2m_min);
    const globalMax = Math.max(...daily.temperature_2m_max);
    const range = Math.max(globalMax - globalMin, 1);

    const dateNow = new Date();
    const weekdayFull = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"][dateNow.getDay()];
    const monthsFull = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
    const dateStrDisplay = `${weekdayFull}, ${dateNow.getDate()} de ${monthsFull[dateNow.getMonth()]}`;

    let html = `
      <div class="hero">
        <div class="place">${uiIcons.pin.replace('viewBox="0 0 24 24"','viewBox="0 0 24 24" width="14" height="14"')} ${state.placeName}${state.placeCountry ? ", " + state.placeCountry : ""}</div>
        <div class="date">${dateStrDisplay}</div>
        <div class="hero-icon-wrap">
          <div class="halo" style="background:${visual.color}"></div>
          ${visual.icon(128)}
        </div>
        <div class="temp">${fmtTemp(cur.temperature_2m)}<sup>°</sup></div>
        <div class="condition">${visual.label}</div>
        <div class="feels-like">Sensación térmica ${fmtTemp(cur.apparent_temperature)}°</div>
        <div class="minmax">
          <span>Máx <b>${fmtTemp(daily.temperature_2m_max[0])}°</b></span>
          <span>Mín <b>${fmtTemp(daily.temperature_2m_min[0])}°</b></span>
        </div>
      </div>

      <div class="section" style="animation-delay:0.1s">
        <div class="section-title">Ahora</div>
        <div class="details-grid">
          <div class="detail-card">${uiIcons.humidity}<div class="val">${cur.relative_humidity_2m}%</div><div class="lbl">Humedad</div></div>
          <div class="detail-card">${uiIcons.wind}<div class="val">${Math.round(cur.wind_speed_10m)}</div><div class="lbl">km/h ${windDirLabel(cur.wind_direction_10m)}</div></div>
          <div class="detail-card">${uiIcons.pressure}<div class="val">${Math.round(cur.pressure_msl)}</div><div class="lbl">hPa</div></div>
          <div class="detail-card">${uiIcons.cloud}<div class="val">${cur.cloud_cover}%</div><div class="lbl">Nubosidad</div></div>
          <div class="detail-card">${uiIcons.uv}<div class="val">${daily.uv_index_max[0] !== undefined ? Math.round(daily.uv_index_max[0]) : "–"}</div><div class="lbl">Índice UV</div></div>
        </div>
      </div>

      <div class="section" style="animation-delay:0.2s">
        <div class="section-title">Próximas 24 horas</div>
        <div class="hourly-scroll">
          ${hourSlice.time.map((t,i)=>{
            const v = getWeatherVisual(hourSlice.code[i], hourSlice.isDay[i]);
            return `<div class="hour-card">
              <div class="hr">${i===0 ? "Ahora" : hourLabel(t)}</div>
              ${v.icon(28)}
              <div class="ht">${fmtTemp(hourSlice.temp[i])}°</div>
              <div class="hp">${hourSlice.precip[i]}%</div>
            </div>`;
          }).join("")}
        </div>
      </div>

      <div class="section" style="animation-delay:0.3s">
        <div class="section-title">Próximos 7 días</div>
        <div class="days-list">
          ${daily.time.map((d,i)=>{
            const v = getWeatherVisual(daily.weather_code[i], true);
            const lo = daily.temperature_2m_min[i];
            const hi = daily.temperature_2m_max[i];
            const leftPct = ((lo - globalMin) / range) * 100;
            const widthPct = ((hi - lo) / range) * 100;
            return `<div class="day-row">
              <div class="dname">${dayLabel(d,i)}<small>${shortDate(d)}</small></div>
              ${v.icon(24)}
              <div class="range-bar"><div class="range-fill" style="left:${leftPct}%; width:${Math.max(widthPct,6)}%"></div></div>
              <div class="day-temps"><span class="lo">${fmtTemp(lo)}°</span><span class="hi">${fmtTemp(hi)}°</span></div>
            </div>`;
          }).join("")}
        </div>
      </div>
    `;
    content.innerHTML = html;
  }

  function renderLoader(msg){
    content.innerHTML = `<div class="loader">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9" stroke-dasharray="42" stroke-linecap="round"/></svg>
      ${msg}
    </div>`;
  }

  function renderError(msg){
    content.innerHTML = `<div class="loader" style="flex-direction:column; gap:14px;">
      <div>${msg}</div>
    </div>`;
  }

  /* ============ APIS ============ */

  async function fetchWeather(lat, lon){
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
      `&current=temperature_2m,relative_humidity_2m,apparent_temperature,is_day,weather_code,cloud_cover,pressure_msl,wind_speed_10m,wind_direction_10m` +
      `&hourly=temperature_2m,weather_code,precipitation_probability,is_day` +
      `&daily=weather_code,temperature_2m_max,temperature_2m_min,uv_index_max` +
      `&timezone=auto&forecast_days=8`;
    const res = await fetch(url);
    if(!res.ok) throw new Error("No se pudo obtener el clima");
    return res.json();
  }

  async function loadWeatherFor(lat, lon, placeName, placeCountry){
    state.lat = lat; state.lon = lon;
    state.placeName = placeName || state.placeName || "Ubicación desconocida";
    state.placeCountry = placeCountry !== undefined ? placeCountry : state.placeCountry;
    renderLoader("Cargando el clima...");
    try{
      const data = await fetchWeather(lat, lon);
      render(data);
    }catch(e){
      renderError("No pudimos cargar el clima. Intenta de nuevo en un momento.");
      console.error(e);
    }
  }

  async function detectByIP(){
    try{
      const res = await fetch("https://ipwho.is/");
      const data = await res.json();
      if(data && data.success !== false && data.latitude && data.longitude){
        await loadWeatherFor(data.latitude, data.longitude, data.city, data.country);
        return;
      }
      throw new Error("ipwho.is sin datos válidos");
    }catch(e){
      console.warn("Fallo detección por IP:", e);
      // fallback silencioso: ubicación por defecto
      await loadWeatherFor(-34.6037, -58.3816, "Buenos Aires", "Argentina");
      showToast("No pudimos detectar tu ubicación por IP. Mostrando una ciudad de referencia.");
    }
  }

  function useGPS(){
    if(!navigator.geolocation){
      showToast("Tu navegador no soporta geolocalización.");
      return;
    }
    const btn = $("#gpsBtn");
    btn.classList.add("loading");
    navigator.geolocation.getCurrentPosition(
      async (pos)=>{
        btn.classList.remove("loading");
        const { latitude, longitude } = pos.coords;
        let name = "Tu ubicación", country = "";
        try{
          const res = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${latitude}&longitude=${longitude}&localityLanguage=es`);
          const geo = await res.json();
          name = geo.locality || geo.neighbourhood || geo.city || geo.principalSubdivision || "Tu ubicación";
          country = geo.countryName || "";
        }catch(e){
          console.warn("Fallo reverse geocoding:", e);
        }
        await loadWeatherFor(latitude, longitude, name, country);
        showToast("Ubicación exacta activada.");
      },
      (err)=>{
        btn.classList.remove("loading");
        console.warn("Geolocalización rechazada o falló:", err);
        showToast("No se pudo usar el GPS. Seguimos con tu ubicación por IP.");
      },
      { enableHighAccuracy:true, timeout:10000, maximumAge:60000 }
    );
  }
  $("#gpsBtn").addEventListener("click", useGPS);

  /* ============ BUSCADOR ============ */
  const searchInput = $("#searchInput");
  const dropdown = $("#dropdown");

  async function searchCities(query){
    if(!query || query.trim().length < 2){
      dropdown.classList.remove("show");
      dropdown.innerHTML = "";
      return;
    }
    try{
      const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=6&language=es&format=json`);
      const data = await res.json();
      if(!data.results || data.results.length === 0){
        dropdown.innerHTML = `<div class="dropdown-item"><small>Sin resultados</small></div>`;
        dropdown.classList.add("show");
        return;
      }
      dropdown.innerHTML = data.results.map(r=>{
        const region = [r.admin1, r.country].filter(Boolean).join(", ");
        return `<div class="dropdown-item" data-lat="${r.latitude}" data-lon="${r.longitude}" data-name="${r.name}" data-country="${r.country||''}">
          <b>${r.name}</b><small>${region}</small>
        </div>`;
      }).join("");
      dropdown.classList.add("show");
    }catch(e){
      console.warn("Fallo búsqueda de ciudades:", e);
    }
  }

  searchInput.addEventListener("input", debounce((e)=> searchCities(e.target.value), 350));
  searchInput.addEventListener("focus", ()=>{ if(dropdown.innerHTML) dropdown.classList.add("show"); });

  dropdown.addEventListener("click", (e)=>{
    const item = e.target.closest(".dropdown-item");
    if(!item || !item.dataset.lat) return;
    const { lat, lon, name, country } = item.dataset;
    dropdown.classList.remove("show");
    searchInput.value = "";
    loadWeatherFor(parseFloat(lat), parseFloat(lon), name, country);
  });

  document.addEventListener("click", (e)=>{
    if(!e.target.closest(".search-wrap")) dropdown.classList.remove("show");
  });

  /* ============ INICIO ============ */
  detectByIP();

})();
</script>
</body>
</html>
